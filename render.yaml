services:
  - type: web
    name: aurora-ai
    runtime: python
    plan: free
    buildCommand: pip install -e ".[serve]"
    startCommand: uvicorn aurora.app.api.__main__:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # Serve the web UI (frontend/index.html) at "/".
      - key: AURORA_FRONTEND_DIR
        value: frontend
      # Provider keys — set these in the Render dashboard (never committed).
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
